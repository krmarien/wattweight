repos:
-   repo: https://github.com/psf/black
    rev: 23.11.0
    hooks:
    -   id: black
        language_version: python3.13
-   repo: https://github.com/PyCQA/flake8
    rev: 6.1.0
    hooks:
    -   id: flake8
        exclude: ^migration/
-   repo: local
    hooks:
    -   id: pytest
        name: pytest
        entry: .venv/bin/pytest
        language: system
        types: [python]
        pass_filenames: false
-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0  # Use the latest version
    hooks:
    -   id: mypy
        # Optional: ensure it sees your local config or uses strict mode
        args: [--strict, --config-file=pyproject.toml]
        # Important: add dependencies if Mypy can't find imports
        additional_dependencies: [
            types-requests,
            types-tabulate,
            "sqlalchemy[mypy]",
            pandas-stubs,
            sqlmodel
        ]
        exclude: ^(venv|migration|tests)/
-   repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
    -   id: isort
        args: ["--profile", "black"] # Redundant if in pyproject.toml, but safe